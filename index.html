<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:#1a1a1a;background:#f0f4f3;min-height:100vh}
.app{display:flex;min-height:100vh}
.login-wrap{display:none;min-height:100vh;align-items:center;justify-content:center;background:#2D6B5E;flex-direction:column;padding:20px}
.login-box{background:#fff;border-radius:20px;padding:36px;width:380px;max-width:95vw;box-shadow:0 8px 40px rgba(0,0,0,.25);text-align:center}
.login-brand{font-size:26px;font-weight:700;color:#C9A84C;letter-spacing:.05em;margin-bottom:4px}
.login-by{font-size:13px;color:rgba(201,168,76,.75);margin-bottom:28px;font-style:italic}
.login-title{font-size:20px;font-weight:700;margin-bottom:6px}
.login-sub{font-size:13px;color:#aaa;margin-bottom:24px}
.login-input{width:100%;padding:12px 14px;border:1.5px solid #e8e8e8;border-radius:10px;font-size:15px;outline:none;text-align:center;letter-spacing:.1em;background:#fafafa;color:#1a1a1a;transition:border-color .15s}
.login-input:focus{border-color:#2D6B5E;background:#fff;box-shadow:0 0 0 4px rgba(45,107,94,.1)}
.login-input.error{border-color:#E24B4A;background:#FEF2F2}
.login-err{font-size:12px;color:#E24B4A;margin-top:8px;min-height:18px}
.login-btn{width:100%;padding:13px;background:#2D6B5E;color:#C9A84C;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:16px}
.login-btn:hover{background:#1e4d43}
.login-footer{font-size:11px;color:#ccc;margin-top:20px}
.login-change{font-size:12px;color:#2D6B5E;cursor:pointer;text-decoration:underline;margin-top:10px;display:block}
.sidebar{width:230px;min-width:230px;background:#2D6B5E;padding:16px 0;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:10;overflow-y:auto}
.logo{padding:12px 16px 14px;border-bottom:1px solid rgba(201,168,76,.25);margin-bottom:8px;text-align:center}
.logo-name{font-size:20px;font-weight:700;color:#C9A84C;letter-spacing:.04em}
.logo-sub{font-size:10px;color:rgba(201,168,76,.6);margin-top:4px}
.nav-section{padding:10px 14px 3px;font-size:10px;letter-spacing:.08em;color:rgba(201,168,76,.45);text-transform:uppercase;font-weight:600}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 16px;cursor:pointer;border-radius:7px;margin:1px 8px;font-size:13px;color:rgba(255,255,255,.75);transition:background .12s}
.nav-item:hover{background:rgba(255,255,255,.1)}
.nav-item.active{background:rgba(201,168,76,.18);color:#C9A84C;font-weight:600}
.nav-item.active .ni{opacity:1;stroke:#C9A84C}
.ni{width:15px;height:15px;flex-shrink:0;opacity:.6}
.main{flex:1;margin-left:230px;padding:28px;background:#f0f4f3}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;gap:12px;flex-wrap:wrap}
.page-title{font-size:22px;font-weight:600}
.page-sub{font-size:12px;color:#888;margin-top:3px}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#1a1a1a;transition:all .12s;white-space:nowrap}
.btn:hover{background:#f5f5f7}
.btn-primary{background:#2D6B5E;color:#C9A84C;border-color:#2D6B5E}
.btn-primary:hover{background:#1e4d43}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:6px}
.btn-danger{background:#E24B4A;color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:12px;padding:5px 10px;font-weight:500}
.btn-danger:hover{background:#A32D2D}
.btn-meas{background:#2D6B5E;color:#C9A84C;border:none;border-radius:7px;cursor:pointer;font-size:12px;padding:6px 12px;font-weight:500;white-space:nowrap}
.btn-meas:hover{background:#1e4d43}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:18px}
.card-p0{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:0;overflow:hidden}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.stat-card{background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:16px}
.stat-label{font-size:12px;color:#888;margin-bottom:5px}
.stat-val{font-size:24px;font-weight:600}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:600;color:#888;letter-spacing:.05em;text-transform:uppercase;padding:10px 14px;border-bottom:1px solid #f0f0f0;background:#fafafa}
td{padding:11px 14px;border-bottom:1px solid #f5f5f5;font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#fafafa}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.b-Pending{background:#FEF3E2;color:#B45309}

.b-Ready{background:#F0FDF4;color:#166534}

.search-wrap input{border:none;outline:none;font-size:13px;flex:1;color:#1a1a1a;background:transparent}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:#fff;border-radius:14px;padding:26px;width:540px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-title{font-size:17px;font-weight:600;margin-bottom:3px}
.modal-sub{font-size:12px;color:#999;margin-bottom:18px}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;font-weight:600;color:#555;margin-bottom:5px;display:block}
.form-input{width:100%;padding:9px 11px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:#fff;color:#1a1a1a;outline:none}
.form-input:focus{border-color:#2D6B5E;box-shadow:0 0 0 3px rgba(45,107,94,.1)}
textarea.form-input{resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid #f0f0f0}
.pill{background:#e6f0ee;color:#2D6B5E;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;display:inline-block;margin:2px}
.pill-rem{display:inline-flex;align-items:center;gap:4px;background:#e6f0ee;color:#2D6B5E;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;margin:3px}
.pill-rem button{background:none;border:none;cursor:pointer;color:#2D6B5E;font-size:15px;line-height:1;padding:0;margin-left:2px}
.pill-rem button:hover{color:#E24B4A}
.back-btn{background:none;border:none;cursor:pointer;font-size:13px;color:#2D6B5E;padding:0;margin-bottom:16px;display:inline-flex;align-items:center;gap:5px;font-weight:500}
.meas-row{background:#f9f9f9;border-radius:8px;padding:9px 13px;font-size:13px;display:flex;align-items:center;justify-content:space-between;gap:8px;border:1px solid #f0f0f0}
.meas-val{font-weight:600;color:#2D6B5E}
.clothes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.cloth-card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:16px;cursor:pointer;transition:all .12s}
.cloth-card:hover{border-color:#2D6B5E}
.section-title{font-size:14px;font-weight:600;margin-bottom:12px}
.empty{text-align:center;padding:40px 20px;color:#aaa;font-size:13px;line-height:1.8}
.add-row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.sel-box{min-height:48px;border:1px solid #e8e8e8;border-radius:8px;padding:8px;background:#fafafa;display:flex;flex-wrap:wrap;gap:2px;align-items:flex-start}
.cloth-tab{padding:7px 14px;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid #e8e8e8;background:#fff;color:#555;font-weight:500;transition:all .12s}
.cloth-tab:hover{background:#f5f5f5}
.cloth-tab.active{background:#2D6B5E;color:#C9A84C;border-color:#2D6B5E}
.meas-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.info-box{background:#e6f0ee;border:1px solid #b8d5ce;border-radius:8px;padding:12px 14px;font-size:13px;color:#2D6B5E;margin-bottom:16px}
.warn-box{background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;padding:12px 14px;font-size:13px;color:#92400E}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:700px){.two-col{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}.meas-grid{grid-template-columns:1fr}.sidebar{transform:translateX(-100%)}.main{margin-left:0}.stats-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyBLQXASONjNoAxek0OYBWm8AD_1i9oQgsI",
  authDomain:"ryreeboutique.firebaseapp.com",
  projectId:"ryreeboutique",
  storageBucket:"ryreeboutique.firebasestorage.app",
  messagingSenderId:"214509276840",
  appId:"1:214509276840:web:28d36a70a3a7d6698dbc9d"
});
var db=firebase.firestore();

var DEFAULT_PW='ryree2024';
function getPw(){return localStorage.getItem('ryree_pw')||DEFAULT_PW;}
function isLoggedIn(){return sessionStorage.getItem('ryree_auth')==='1';}

document.getElementById('login-btn').onclick=doLogin;
document.getElementById('login-pw').onkeydown=function(e){if(e.key==='Enter')doLogin();};
document.getElementById('logout-btn').onclick=doLogout;
document.getElementById('chpw-btn').onclick=showChangePw;
document.getElementById('chpw-link').onclick=showChangePw;
document.querySelectorAll('.nav-item').forEach(function(el){
  el.onclick=function(){nav(this.getAttribute('data-page'));};
});

function doLogin(){
  var pw=document.getElementById('login-pw').value;
  if(pw===getPw()){
    sessionStorage.setItem('ryree_auth','1');
    document.getElementById('login-pw').classList.remove('error');
    document.getElementById('login-err').textContent='';
    showApp();
  }else{
    document.getElementById('login-pw').classList.add('error');
    document.getElementById('login-err').textContent='Incorrect password.';
    document.getElementById('login-pw').value='';
  }
}
function doLogout(){
  if(!confirm('Sign out?'))return;
  sessionStorage.removeItem('ryree_auth');
  document.getElementById('login-wrap').style.display='flex';
  document.getElementById('app-wrap').style.display='none';
  document.getElementById('login-pw').value='';
}
function showChangePw(){
  var wrap=mk('div');
  setTxt(mk('div','modal-title','Change password'),wrap);
  setTxt(mk('div','modal-sub','Set a new password for everyone.'),wrap);
  var cur=mkInput('pw-cur','password','Current password');
  var nw=mkInput('pw-new','password','New password');
  var cf=mkInput('pw-cf','password','Confirm new password');
  var err=mk('div');err.id='pw-err';err.style.cssText='font-size:12px;color:#E24B4A;min-height:18px';
  app(wrap,[
    mkFg('Current password',cur),
    mkFg('New password',nw),
    mkFg('Confirm new password',cf),
    err,
    mkActions([mkBtn('Cancel',closeModal),mkBtn('Change',saveNewPw,'btn btn-primary')])
  ]);
  showM(wrap);
}
function saveNewPw(){
  var cur=document.getElementById('pw-cur').value;
  var nw=document.getElementById('pw-new').value.trim();
  var cf=document.getElementById('pw-cf').value.trim();
  var err=document.getElementById('pw-err');
  if(cur!==getPw()){err.textContent='Current password incorrect.';return;}
  if(!nw||nw.length<4){err.textContent='Must be at least 4 characters.';return;}
  if(nw!==cf){err.textContent='Passwords do not match.';return;}
  localStorage.setItem('ryree_pw',nw);
  closeModal();alert('Password changed!');
}
function showApp(){
  document.getElementById('login-wrap').style.display='none';
  document.getElementById('app-wrap').style.display='flex';
  initDB();
}

var DB={measitems:[],clothing:[],clients:[],orders:[],appointments:[],receipts:[],expenses:[]};
var unsubs=[];
function setSync(s,msg){
  var d=document.getElementById('sync-dot'),t=document.getElementById('sync-text');
  if(!d)return;
  d.style.background={ok:'#C9A84C',err:'#E24B4A',loading:'#F59E0B'}[s]||'#F59E0B';
  if(t)t.textContent=msg||'';
}
function initDB(){
  setSync('loading','Connecting...');
  var cols=['measitems','clothing','clients','orders','appointments','receipts','expenses'];
  var loaded=0;
  unsubs.forEach(function(u){u();});unsubs=[];
  cols.forEach(function(col){
    var u=db.collection(col).onSnapshot(function(snap){
      DB[col]=snap.docs.map(function(d){var o=d.data();o.id=d.id;return o;});
      if(++loaded>=cols.length)setSync('ok','Synced');
      render();
    },function(e){setSync('err','Offline');console.error(e);});
    unsubs.push(u);
  });
}
function dbSave(col,item){
  setSync('loading','Saving...');
  db.collection(col).doc(item.id).set(item)
    .then(function(){setSync('ok','Saved');})
    .catch(function(e){setSync('err','Error');console.error(e);});
}
function dbDel(col,id){
  setSync('loading','Deleting...');
  db.collection(col).doc(id).delete()
    .then(function(){setSync('ok','Synced');})
    .catch(function(e){setSync('err','Error');console.error(e);});
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function initials(n){return (n||'?').split(' ').map(function(w){return w[0];}).slice(0,2).join('').toUpperCase();}
function rupee(v){return '\u20b9'+Number(v||0).toLocaleString('en-IN');}

// DOM helpers
function mk(tag,cls,txt){
  var e=document.createElement(tag);
  if(cls)e.className=cls;
  if(txt!==undefined)e.textContent=txt;
  return e;
}
function app(parent,children){
  [].concat(children).forEach(function(c){if(c)parent.appendChild(c);});
  return parent;
}
function setTxt(el,parent){parent.appendChild(el);return el;}
function mkBtn(text,onClick,cls){
  var b=mk('button',cls||'btn',text);
  b.onclick=onClick;return b;
}
function mkInput(id,type,placeholder,value){
  var i=mk('input','form-input');
  i.id=id;i.type=type||'text';
  if(placeholder)i.placeholder=placeholder;
  if(value!==undefined)i.value=value;
  return i;
}
function mkSelect(id,options,selectedVal){
  var s=mk('select','form-input');s.id=id;
  options.forEach(function(o){
    var opt=mk('option');opt.value=o.value;opt.textContent=o.label;
    if(o.value===selectedVal)opt.selected=true;
    s.appendChild(opt);
  });
  return s;
}
function mkFg(label,input){
  var fg=mk('div','form-group');
  var l=mk('label','form-label',label);
  app(fg,[l,input]);return fg;
}
function mkActions(btns){
  var d=mk('div','modal-actions');
  btns.forEach(function(b){d.appendChild(b);});
  return d;
}
function mkAvatar(name,size){
  var a=mk('div','avatar');
  a.textContent=initials(name);
  if(size)a.style.cssText='width:'+size+'px;height:'+size+'px;font-size:'+(size*0.35)+'px';
  return a;
}
function mkBadge(status){

function mkRow(style){var d=mk('div');d.style.cssText=style||'display:flex;align-items:center;gap:8px';return d;}
function mkTable(headers){
  var t=mk('table');

function mkTr(cells){

  return tr;
}

function delMeasItem(id){
  var used=DB.clothing.some(function(c){return (c.measitemIds||[]).indexOf(id)>=0;});

  dbDel('measitems',id);

var _mCli=null,_mCloth=null;
function openTakeMeas(clientId,prefillCid){
  if(!DB.clothing.length){alert('Add clothing items first.');return;}
  if(!DB.clothing.some(function(c){return (c.measitemIds||[]).length>0;})){alert('Link measurement items to clothing items first.');return;}
  _mCli=clientId;
  _mCloth=prefillCid||(DB.clothing.filter(function(c){return (c.measitemIds||[]).length>0;})[0]||DB.clothing[0]).id;
  renderTakeModal();

function renderTakeModal(){
  var cl=DB.clients.find(function(x){return x.id===_mCli;});
  var ac=DB.clothing.find(function(x){return x.id===_mCloth;});
  var linked=(ac.measitemIds||[]).map(function(id){return DB.measitems.find(function(x){return x.id===id;});}).filter(Boolean);
  var existing=(cl.measurements&&cl.measurements[_mCloth])||{};
  var wrap=mk('div');
  app(wrap,[mk('div','modal-title','Take Measurements - '+cl.name),
    mk('div','modal-sub','Select clothing tab, fill values. Checkmark = already recorded.')]);
  var tabs=mk('div');tabs.style.cssText='display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px';
  DB.clothing.forEach(function(c){
    var done=cl.measurements&&cl.measurements[c.id]&&Object.keys(cl.measurements[c.id]).length>0;
    var tb=mk('button','cloth-tab'+(c.id===_mCloth?' active':''));
    tb.textContent=c.name+(done&&c.id!==_mCloth?' ✓':'')+(c.measitemIds&&c.measitemIds.length?'':' *');
    tb.setAttribute('data-cid',c.id);
    tb.onclick=function(){_mCloth=this.getAttribute('data-cid');renderTakeModal();};
    tabs.appendChild(tb);
  });
  wrap.appendChild(tabs);
  var fields=mk('div');
  if(!linked.length){fields.appendChild(mk('div','warn-box','No fields linked to '+ac.name+'. Go to Clothing Items > Manage measurements.'));}
  else{
    var grid=mk('div','meas-grid');
    linked.forEach(function(m){
      var inp=mkInput('mf-'+m.id,'text','—',existing[m.name]||'');
      inp.className='form-input mf';inp.setAttribute('data-name',m.name);
      grid.appendChild(mkFg(m.name+(m.unit?' ('+m.unit+')':''),inp));
    });
    fields.appendChild(grid);
  }
  wrap.appendChild(fields);
  wrap.appendChild(mkActions([
    mkBtn('Close',closeModal),
    mkBtn('Save & next',function(){
      var cl2=DB.clients.find(function(x){return x.id===_mCli;});
      var vals={};
      document.querySelectorAll('.mf').forEach(function(inp){if(inp.value.trim())vals[inp.getAttribute('data-name')]=inp.value.trim();});
      var meas=JSON.parse(JSON.stringify(cl2.measurements||{}));
      meas[_mCloth]=vals;
      dbSave('clients',Object.assign({},cl2,{measurements:meas}));

    },'btn btn-primary')
  ]));

function printCard(clientId){
  var cl=DB.clients.find(function(x){return x.id===clientId;});
  var mKeys=Object.keys(cl.measurements||{});
  var today=new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
  var secs=mKeys.map(function(cid){
    var cloth=DB.clothing.find(function(x){return x.id===cid;});if(!cloth)return'';

function pgAppointments(){
  var today=new Date().toISOString().split('T')[0];

  function makeTbl(list,dim){
    var t=mkTable(['Client','Date','Time','Purpose','']);
    list.forEach(function(a){
      var cl=DB.clients.find(function(x){return x.id===a.clientId;});
      var cc=mkRow();var av=mkAvatar(cl?cl.name:'?',28);var cn=document.createTextNode(cl?cl.name:'?');app(cc,[av,cn]);
      var ccTd=mk('td');ccTd.appendChild(cc);

      var tr=mk('tr');if(dim)tr.style.opacity='0.55';
      app(tr,[ccTd,dtTd,tmTd,puTd,acTd]);t._body.appendChild(tr);
    });
    return t;
  }
  var wrap=mk('div');
  wrap.appendChild(mkPageHeader('Appointments',up.length+' upcoming',mkBtn('+ Schedule',function(){openApptModal();},'btn btn-primary')));
  var utt=mk('div','section-title','Upcoming');

  app(wrap,[utt,uw,ptt,pw]);return wrap;
}

    var delB=mkBtn('Del',function(){if(confirm('Delete?'))dbDel('expenses',e.id);},'btn-danger');
    var delTd=mk('td');delTd.appendChild(delB);
    var modeTd=mk('td');modeTd.appendChild(modeBadge);
    var tr=mk('tr');
    [mk('td',null,e.date),mk('td',null,e.category||'—'),amtTd,modeTd,mk('td',null,e.description||'—'),delTd].forEach(function(td){tr.appendChild(td);});
    t._body.appendChild(tr);
  });
  tw.appendChild(t);
}

function openExpenseModal(){
  var catOpts=EXPENSE_CATS.map(function(c){return {value:c,label:c};});
  var modeOpts=PAY_MODES.map(function(m){return {value:m,label:m};});
  var catSel=mkSelect('e-cat',catOpts,'');
  var modeSel=mkSelect('e-mode',modeOpts,'Cash');
  var amtInp=mkInput('e-amount','number','Amount (₹)');
  var dateInp=mkInput('e-date','date','',new Date().toISOString().split('T')[0]);
  var descInp=mkInput('e-desc','text','e.g. Zardosi thread, Salary to Priya...');
  var wrap=mk('div');
  app(wrap,[
    mk('div','modal-title','Add Expense'),
    mk('div','modal-sub','Record an outgoing payment.'),
    app(mk('div','form-row'),[mkFg('Date',dateInp),mkFg('Amount (₹) *',amtInp)]),
    mkFg('Category',catSel),
    app(mk('div','form-row'),[mkFg('Payment mode',modeSel),mkFg('Description',descInp)]),
    mkActions([mkBtn('Cancel',closeModal),mkBtn('Save',function(){
      var amt=document.getElementById('e-amount').value;if(!amt)return;
      dbSave('expenses',{id:uid(),
        date:document.getElementById('e-date').value,
        amount:amt,
        category:document.getElementById('e-cat').value,
        mode:document.getElementById('e-mode').value,
        description:document.getElementById('e-desc').value,
        created:Date.now()
      });
      closeModal();
    },'btn btn-primary')])
  ]);
  showM(wrap);
  setTimeout(function(){var e=document.getElementById('e-amount');if(e)e.focus();},50);
}

// ── MODAL ─────────────────────────────────────────────────────────────────
function showM(contentEl){
  var ov=mk('div','modal-overlay');
  var modal=mk('div','modal');
  modal.appendChild(contentEl);ov.appendChild(modal);
  ov.onclick=function(e){if(e.target===ov)closeModal();};
  var root=document.getElementById('modal-root');
  root.innerHTML='';root.appendChild(ov);
}
function closeModal(){document.getElementById('modal-root').innerHTML='';}

// ── INIT ──────────────────────────────────────────────────────────────────
if(isLoggedIn()){showApp();}
else{document.getElementById('login-wrap').style.display='flex';}
</script>
