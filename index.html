<script>
// ── AUTH ─────────────────────────────────────────────────────────────────
const DEFAULT_PW='ryree2024';
function getStoredPw(){return localStorage.getItem('ryree_pw')||DEFAULT_PW;}
function isLoggedIn(){return sessionStorage.getItem('ryree_auth')==='1';}
function initAuth(){
  if(isLoggedIn())showApp();
  else showLoginScreen();
}
function showLoginScreen(){
  document.getElementById('login-wrap').style.display='flex';
  document.getElementById('app-wrap').style.display='none';
  setTimeout(()=>document.getElementById('login-pw')?.focus(),100);
}
function showApp(){
  document.getElementById('login-wrap').style.display='none';
  document.getElementById('app-wrap').style.display='flex';
  initFirebaseListeners();
}
function doLogin(){
  const pw=document.getElementById('login-pw').value;
  const inp=document.getElementById('login-pw');
  const err=document.getElementById('login-err');
  if(pw===getStoredPw()){
    sessionStorage.setItem('ryree_auth','1');
    inp.classList.remove('error');err.textContent='';showApp();
  }else{
    inp.classList.add('error');err.textContent='Incorrect password. Please try again.';inp.value='';inp.focus();
  }
}
function doLogout(){
  if(!confirm('Sign out?'))return;
  sessionStorage.removeItem('ryree_auth');
  showLoginScreen();
  document.getElementById('login-pw').value='';
  document.getElementById('login-err').textContent='';
  document.getElementById('login-pw').classList.remove('error');
}
function showChangePw(){
  showModal(`<div class="modal-title">Change password</div>
    <div class="modal-sub">Set a new password. Everyone using the app will need the new password.</div>
    <div class="form-group"><label class="form-label">Current password</label><input class="form-input" id="pw-current" type="password"></div>
    <div class="form-group"><label class="form-label">New password</label><input class="form-input" id="pw-new" type="password"></div>
    <div class="form-group"><label class="form-label">Confirm new password</label><input class="form-input" id="pw-confirm" type="password"></div>
    <div id="pw-err" style="font-size:12px;color:#E24B4A;min-height:18px"></div>
    <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveNewPw()">Change</button></div>`);
  setTimeout(()=>document.getElementById('pw-current')?.focus(),50);
}
function showChangePwFromLogin(){showChangePw();}
function saveNewPw(){
  const cur=document.getElementById('pw-current').value;
  const nw=document.getElementById('pw-new').value.trim();
  const cf=document.getElementById('pw-confirm').value.trim();
  const err=document.getElementById('pw-err');
  if(cur!==getStoredPw()){err.textContent='Current password incorrect.';return;}
  if(!nw||nw.length<4){err.textContent='Password must be at least 4 characters.';return;}
  if(nw!==cf){err.textContent='Passwords do not match.';return;}
  localStorage.setItem('ryree_pw',nw);
  closeModal();alert('✅ Password changed!');
}

// ── FIREBASE DATA LAYER ──────────────────────────────────────────────────
let DB={measitems:[],clothing:[],clients:[],orders:[],appointments:[]};
let _unsubs=[];
let _syncOk=false;

function setSyncStatus(status,msg){
  const dot=document.getElementById('sync-dot');
  const txt=document.getElementById('sync-text');
  if(!dot)return;
  if(status==='ok'){dot.style.background='#C9A84C';txt.textContent=msg||'Synced';}
  else if(status==='error'){dot.style.background='#E24B4A';txt.textContent=msg||'Offline';}
  else{dot.style.background='#F59E0B';txt.textContent=msg||'Syncing...';}
}

function waitForFirebase(cb){
  if(window.$db){cb();return;}
  window.addEventListener('firebase-ready',cb,{once:true});
}

function initFirebaseListeners(){
  waitForFirebase(()=>{
    setSyncStatus('loading','Connecting...');
    const cols=['measitems','clothing','clients','orders','appointments'];
    let loaded=0;
    _unsubs.forEach(u=>u());_unsubs=[];
    cols.forEach(colName=>{
      const unsub=window.$db.collection(colName).onSnapshot(
        (snap)=>{
          DB[colName]=snap.docs.map(d=>({id:d.id,...d.data()}));
          loaded++;
          if(loaded>=cols.length){setSyncStatus('ok','Synced');render();}
          else render();
        },
        (err)=>{setSyncStatus('error','Offline');console.error(err);}
      );
      _unsubs.push(unsub);
    });
  });
}

async function dbSave(colName,item){
  waitForFirebase(async()=>{
    try{
      setSyncStatus('loading','Saving...');
      await window.$doc(colName,item.id).set(item);
      setSyncStatus('ok','Saved ✓');
    }catch(e){setSyncStatus('error','Save failed');console.error(e);}
  });
}

async function dbDelete(colName,id){
  waitForFirebase(async()=>{
    try{
      setSyncStatus('loading','Deleting...');
      await window.$doc(colName,id).delete();
      setSyncStatus('ok','Synced');
    }catch(e){setSyncStatus('error','Delete failed');console.error(e);}
  });
}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

let page='measitems',selClient=null,selCloth=null;
function nav(p){

function render(){
  const map={measitems:renderMeasItems,clothing:renderClothing,clients:renderClients,
    orders:renderOrders,appointments:renderAppointments,dashboard:renderDashboard};
  document.getElementById('main-content').innerHTML=(map[page]||renderDashboard)();
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function initials(n){return(n||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase()}
function statusBadge(s){const m={Pending:'b-pending','In Progress':'b-prog',Ready:'b-active',Delivered:'b-done',Cancelled:'b-cancelled'};return`<span class="badge ${m[s]||'b-pending'}">${esc(s)}</span>`}

      <div class="form-group"><label class="form-label">Name *</label><input class="form-input" id="m-name" value="${esc(m.name)}"></div>

function delMeasItem(id){
  const used=DB.clothing.some(c=>(c.measitemIds||[]).includes(id));

  // Also remove from clothing items
  DB.clothing.forEach(c=>{
    if((c.measitemIds||[]).includes(id)){

      dbSave('clothing',updated);

  const c=DB.clothing.find(x=>x.id===_linkCid);

function addLinkItem(){const id=document.getElementById('link-select')?.value;if(!id)return;if(!_linkSelected.includes(id))_linkSelected.push(id);renderLinkModal();}

function saveLinkMeasItems(){
  const c=DB.clothing.find(x=>x.id===_linkCid);

}

let _measClientId=null,_measActiveCloth=null;
function openTakeMeas(clientId,prefillCid){
  if(!DB.clothing.length){alert('Add clothing items first.');return;}
  const hasLinked=DB.clothing.some(c=>(c.measitemIds||[]).length>0);
  if(!hasLinked){alert('Link measurement items to clothing items first.');return;}
  _measClientId=clientId;
  _measActiveCloth=prefillCid||DB.clothing.find(c=>(c.measitemIds||[]).length>0)?.id||DB.clothing[0].id;
  renderTakeMeasModal();
}
function renderTakeMeasModal(){
  const cl=DB.clients.find(x=>x.id===_measClientId);
  const tabs=DB.clothing.map(c=>{
    const has=(c.measitemIds||[]).length>0;
    const done=cl.measurements?.[c.id]&&Object.keys(cl.measurements[c.id]).length>0;
    return`<button class="cloth-tab${c.id===_measActiveCloth?' active':''}" onclick="_measActiveCloth='${c.id}';renderTakeMeasModal()">${esc(c.name)}${done&&c.id!==_measActiveCloth?' ✓':''}${!has?' *':''}</button>`;
  }).join('');
  const activeCloth=DB.clothing.find(x=>x.id===_measActiveCloth);
  const linked=(activeCloth?.measitemIds||[]).map(id=>DB.measitems.find(x=>x.id===id)).filter(Boolean);
  const existing=cl.measurements?.[_measActiveCloth]||{};
  const fields=linked.length===0
    ?`<div class="warn-box">No fields linked to "${esc(activeCloth?.name)}". Go to Clothing Items → Manage measurements.</div>`
    :`<div class="meas-grid">${linked.map(m=>`<div class="form-group" style="margin-bottom:0">
        <label class="form-label">${esc(m.name)}${m.unit?` <span style="font-weight:400;color:#bbb">(${esc(m.unit)})</span>`:''}</label>
        <input class="form-input mf" data-name="${esc(m.name)}" value="${esc(existing[m.name]||'')}" placeholder="—">
      </div>`).join('')}</div>`;
  showModal(`<div class="modal-title">Take Measurements — ${esc(cl.name)}</div>
    <div class="modal-sub">Select clothing item tab, fill in values, save. ✓ = already recorded.</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px">${tabs}</div>
    <div id="meas-fields-body">${fields}</div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Close</button>
      <button class="btn btn-primary" onclick="saveTakeMeas()">Save & next →</button>
    </div>`);
}
function saveTakeMeas(){
  const cl=DB.clients.find(x=>x.id===_measClientId);
  const vals={};
  document.querySelectorAll('.mf').forEach(el=>{if(el.value.trim())vals[el.dataset.name]=el.value.trim();});
  const updated={...cl,measurements:{...(cl.measurements||{}),[${_measActiveCloth}]:vals}};
  dbSave('clients',updated);
  const clothIds=DB.clothing.map(c=>c.id);
  const next=clothIds[clothIds.indexOf(_measActiveCloth)+1];
  if(next){_measActiveCloth=next;renderTakeMeasModal();}
  else{closeModal();}
}

function printMeasCard(clientId){
  const cl=DB.clients.find(x=>x.id===clientId);
  const measKeys=Object.keys(cl.measurements||{});
  const today=new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
  const orderInfo=DB.orders.filter(o=>o.clientId===clientId&&!['Delivered','Cancelled'].includes(o.status));
  const sections=measKeys.map(cid=>{
    const cloth=DB.clothing.find(x=>x.id===cid);if(!cloth)return'';
    const vals=cl.measurements[cid]||{};
    const rows=Object.entries(vals).map(([k,v])=>`<tr><td style="padding:7px 12px;border:1px solid #e0e0e0;font-size:13px;color:#444">${k}</td><td style="padding:7px 12px;border:1px solid #e0e0e0;font-size:14px;font-weight:700;color:#222;text-align:center;width:35%">${v}</td></tr>`).join('');
    return`<div style="margin-bottom:20px"><div style="background:#2D6B5E;color:#C9A84C;padding:8px 14px;font-size:13px;font-weight:700;border-radius:6px 6px 0 0;letter-spacing:.03em">${cloth.name.toUpperCase()}</div>
    <table style="width:100%;border-collapse:collapse"><thead><tr>
      <td style="padding:6px 12px;border:1px solid #e0e0e0;font-size:11px;font-weight:700;color:#999;background:#f8f8f8">MEASUREMENT</td>
      <td style="padding:6px 12px;border:1px solid #e0e0e0;font-size:11px;font-weight:700;color:#999;background:#f8f8f8;text-align:center">VALUE</td>
    </tr></thead><tbody>${rows}</tbody></table></div>`;})}.join('');
  const orderSection=orderInfo.length?`<div style="margin-top:20px;padding-top:16px;border-top:2px dashed #e0e0e0">
    <div style="font-size:11px;font-weight:700;color:#999;margin-bottom:10px">ACTIVE ORDERS</div>
    ${orderInfo.map(o=>`<div style="display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid #f0f0f0"><span>${o.item}</span><span style="color:#B45309;font-weight:600">${o.status}${o.delivery?' · By '+o.delivery:''}</span></div>`).join('')}</div>`:'';
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Measurement Card — ${cl.name}</title>
  <style>*{box-sizing:border-box}body{font-family:Arial,sans-serif;margin:0;padding:24px;background:#fff}@media print{body{padding:12px}}</style>
  </head><body>
  <div style="border:2px solid #2D6B5E;border-radius:10px;padding:24px;max-width:520px;margin:0 auto">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;padding-bottom:16px;border-bottom:2px solid #f0f0f0">
      <div>
        <div style="font-size:10px;color:#aaa;font-weight:700;letter-spacing:.08em;margin-bottom:4px">RYREE BY SHREYA DESHMUKH</div>
        <div style="font-size:22px;font-weight:800;color:#1a1a1a">${cl.name}</div>
        <div style="font-size:13px;color:#666;margin-top:5px">${cl.phone||''}${cl.email?' · '+cl.email:''}</div>
      </div>
      <div style="text-align:right;background:#e6f0ee;padding:10px 14px;border-radius:8px">
        <div style="font-size:10px;color:#aaa;font-weight:700;margin-bottom:2px">DATE</div>
        <div style="font-size:13px;font-weight:700;color:#2D6B5E">${today}</div>
      </div>
    </div>
    ${measKeys.length===0?'<p style="color:#aaa">No measurements recorded.</p>':sections}
    ${cl.notes?`<div style="margin-top:18px;background:#f9f9f9;border-left:4px solid #C9A84C;padding:10px 14px;font-size:13px;color:#555;border-radius:0 6px 6px 0"><strong>Notes:</strong> ${cl.notes}</div>`:''}
    ${orderSection}
    <div style="margin-top:20px;text-align:center;font-size:11px;color:#ccc;padding-top:14px;border-top:1px solid #f0f0f0">Ryree by Shreya Deshmukh · ${today}</div>
  </div></body></html>`;
  const win=window.open('','_blank');
  if(win){win.document.write(html);win.document.close();setTimeout(()=>win.print(),500);}
  else alert('Please allow popups to print.');
}

// ── ORDERS ───────────────────────────────────────────────────────────────
function renderOrders(){
  const statuses=['Pending','In Progress','Ready','Delivered','Cancelled'];
  return`<div class="page-header">
    <div><div class="page-title">Orders</div><div class="page-sub">${DB.orders.length} total</div></div>
    <button class="btn btn-primary" onclick="addOrder()">+ New Order</button>
  </div>
  <div class="card-p0">
  ${DB.orders.length===0?`<div class="empty">No orders yet.</div>`:`
  <table><thead><tr><th>Client</th><th>Item</th><th>Amount</th><th>Advance</th><th>Delivery</th><th>Status</th><th></th></tr></thead><tbody>
  ${DB.orders.slice().reverse().map(o=>{
    const cl=DB.clients.find(x=>x.id===o.clientId);
    return`<tr>
      <td><div style="display:flex;align-items:center;gap:9px"><div class="avatar" style="width:28px;height:28px;font-size:10px">${initials(cl?.name)}</div><span style="font-weight:500">${esc(cl?.name||'?')}</span></div></td>
      <td>${esc(o.item)}</td><td style="font-weight:600">${fmtMoney(o.amount)}</td>
      <td style="color:#888">${o.advance?fmtMoney(o.advance):'—'}</td>
      <td style="color:#888">${esc(o.delivery||'—')}</td>
      <td><select style="border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:600;outline:none;color:#555" onchange="updateOrderStatus('${o.id}',this.value)">
        ${statuses.map(s=>`<option${o.status===s?' selected':''}>${s}</option>`).join('')}
      </select></td>
      <td><div style="display:flex;gap:5px">
        <button class="btn btn-xs" onclick="editOrder('${o.id}')">Edit</button>
        <button class="btn-danger" onclick="delOrder('${o.id}')">Del</button>
      </div></td>
    </tr>`;})}.join('')}
  </tbody></table>`}
  </div>`;
}
function addOrder(){
  const co=DB.clients.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('');
  const io=DB.clothing.map(c=>`<option value="${esc(c.name)}">${esc(c.name)}</option>`).join('');
  showModal(`<div class="modal-title">New order</div>
    <div class="form-group"><label class="form-label">Client *</label><select class="form-input" id="m-client"><option value="">Select...</option>${co}</select></div>
    <div class="form-group"><label class="form-label">Clothing item *</label><select class="form-input" id="m-item"><option value="">Select...</option>${io}</select></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Total amount (₹)</label><input class="form-input" id="m-amount" type="number" placeholder="0"></div>
      <div class="form-group"><label class="form-label">Advance paid (₹)</label><input class="form-input" id="m-advance" type="number" placeholder="0"></div>
    </div>
    <div class="form-group"><label class="form-label">Delivery date</label><input class="form-input" id="m-delivery" type="date"></div>
    <div class="form-group"><label class="form-label">Notes</label><textarea class="form-input" id="m-notes" rows="2"></textarea></div>
    <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveOrder()">Add</button></div>`);
}
function editOrder(id){
  const o=DB.orders.find(x=>x.id===id);
  const co=DB.clients.map(c=>`<option value="${c.id}"${c.id===o.clientId?' selected':''}>${esc(c.name)}</option>`).join('');
  const io=DB.clothing.map(c=>`<option value="${esc(c.name)}"${c.name===o.item?' selected':''}>${esc(c.name)}</option>`).join('');
  showModal(`<div class="modal-title">Edit order</div>
    <div class="form-group"><label class="form-label">Client</label><select class="form-input" id="m-client">${co}</select></div>
    <div class="form-group"><label class="form-label">Item</label><select class="form-input" id="m-item">${io}</select></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Total amount (₹)</label><input class="form-input" id="m-amount" type="number" value="${o.amount||0}"></div>
      <div class="form-group"><label class="form-label">Advance paid (₹)</label><input class="form-input" id="m-advance" type="number" value="${o.advance||0}"></div>
    </div>
    <div class="form-group"><label class="form-label">Delivery date</label><input class="form-input" id="m-delivery" type="date" value="${esc(o.delivery||'')}"></div>
    <div class="form-group"><label class="form-label">Notes</label><textarea class="form-input" id="m-notes" rows="2">${esc(o.notes||'')}</textarea></div>
    <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveOrder('${id}')">Save</button></div>`);
}
function saveOrder(id){
  const clientId=document.getElementById('m-client').value;const item=document.getElementById('m-item').value;
  if(!clientId||!item)return;
  const existing=id?DB.orders.find(x=>x.id===id):null;
  const o={
    id:id||uid(),clientId,item,
    amount:document.getElementById('m-amount').value,
    advance:document.getElementById('m-advance').value,
    delivery:document.getElementById('m-delivery').value,
    notes:document.getElementById('m-notes').value,
    status:existing?.status||'Pending',
    created:existing?.created||Date.now()
  };
  dbSave('orders',o);closeModal();
}
function updateOrderStatus(id,s){
  const o=DB.orders.find(x=>x.id===id);
  if(o)dbSave('orders',{...o,status:s});
}
function delOrder(id){if(!confirm('Delete this order?'))return;dbDelete('orders',id);}

// ── APPOINTMENTS ─────────────────────────────────────────────────────────
function renderAppointments(){
  const today=new Date().toISOString().split('T')[0];
  const up=DB.appointments.filter(a=>a.date>=today).sort((a,b)=>a.date.localeCompare(b.date));
  const past=DB.appointments.filter(a=>a.date<today).sort((a,b)=>b.date.localeCompare(a.date));
  const tbl=(list,dim)=>`<table><thead><tr><th>Client</th><th>Date</th><th>Time</th><th>Purpose</th><th></th></tr></thead><tbody>
    ${list.map(a=>{const cl=DB.clients.find(x=>x.id===a.clientId);
      return`<tr style="${dim?'opacity:.55':''}">
        <td><div style="display:flex;align-items:center;gap:9px"><div class="avatar" style="width:28px;height:28px;font-size:10px">${initials(cl?.name)}</div>${esc(cl?.name||'?')}</div></td>
        <td style="font-weight:500">${esc(a.date)}</td><td style="color:#888">${esc(a.time||'—')}</td><td>${esc(a.purpose||'—')}</td>
        <td><button class="btn-danger" onclick="delAppt('${a.id}')">Delete</button></td>
      </tr>`;})}.join('')}</tbody></table>`;
  return`<div class="page-header">
    <div><div class="page-title">Appointments</div><div class="page-sub">${up.length} upcoming</div></div>
    <button class="btn btn-primary" onclick="addAppt()">+ Schedule</button>
  </div>
  <div class="section-title">Upcoming</div>
  <div class="card-p0" style="margin-bottom:20px">${up.length===0?`<div class="empty">No upcoming appointments.</div>`:tbl(up,false)}</div>
  <div class="section-title" style="color:#aaa">Past</div>
  <div class="card-p0">${past.length===0?`<div class="empty">No past appointments.</div>`:tbl(past.slice(0,20),true)}</div>`;
}
function addAppt(){
  const co=DB.clients.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('');
  showModal(`<div class="modal-title">Schedule appointment</div>
    <div class="form-group"><label class="form-label">Client *</label><select class="form-input" id="m-client"><option value="">Select...</option>${co}</select></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Date *</label><input class="form-input" id="m-date" type="date" value="${new Date().toISOString().split('T')[0]}"></div>
      <div class="form-group"><label class="form-label">Time</label><input class="form-input" id="m-time" type="time"></div>
    </div>
    <div class="form-group"><label class="form-label">Purpose</label><input class="form-input" id="m-purpose" placeholder="e.g. First fitting, Trial, Delivery"></div>
    <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveAppt()">Schedule</button></div>`);
}
function saveAppt(){
  const cid=document.getElementById('m-client').value;const date=document.getElementById('m-date').value;if(!cid||!date)return;
  dbSave('appointments',{id:uid(),clientId:cid,date,time:document.getElementById('m-time').value,purpose:document.getElementById('m-purpose').value});
  closeModal();
}
function delAppt(id){dbDelete('appointments',id);}

// ── DASHBOARD ────────────────────────────────────────────────────────────
function renderDashboard(){
  const today=new Date().toISOString().split('T')[0];
  const active=DB.orders.filter(o=>['Pending','In Progress','Ready'].includes(o.status)).length;
  const rev=DB.orders.filter(o=>o.status==='Delivered').reduce((a,o)=>a+Number(o.amount||0),0);
  const todayA=DB.appointments.filter(a=>a.date===today).length;
  const recentO=DB.orders.slice().reverse().slice(0,6);
  const upA=DB.appointments.filter(a=>a.date>=today).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,6);
  return`<div class="page-header"><div class="page-title">Dashboard</div></div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">Total clients</div><div class="stat-val">${DB.clients.length}</div></div>
    <div class="stat-card"><div class="stat-label">Active orders</div><div class="stat-val" style="color:#2D6B5E">${active}</div></div>
    <div class="stat-card"><div class="stat-label">Today's appointments</div><div class="stat-val" style="color:#2D6B5E">${todayA}</div></div>
    <div class="stat-card"><div class="stat-label">Revenue collected</div><div class="stat-val" style="color:#C9A84C">${fmtMoney(rev)}</div></div>
  </div>
  <div class="two-col">
    <div><div class="section-title">Recent orders</div>
      <div class="card-p0">${recentO.length===0?`<div class="empty" style="padding:24px">No orders yet.</div>`:`
      ${recentO.map(o=>{const cl=DB.clients.find(x=>x.id===o.clientId);return`<div style="display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid #f5f5f5">
        <div><div style="font-size:13px;font-weight:600">${esc(cl?.name||'?')}</div><div style="font-size:11px;color:#aaa">${esc(o.item)} · ${fmtMoney(o.amount)}</div></div>${statusBadge(o.status)}</div>`;})}.join('')}` }
      </div>
    </div>
    <div><div class="section-title">Upcoming appointments</div>
      <div class="card-p0">${upA.length===0?`<div class="empty" style="padding:24px">No upcoming appointments.</div>`:`
      ${upA.map(a=>{const cl=DB.clients.find(x=>x.id===a.clientId);return`<div style="display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid #f5f5f5">
        <div><div style="font-size:13px;font-weight:600">${esc(cl?.name||'?')}</div><div style="font-size:11px;color:#aaa">${esc(a.purpose||'Appointment')}</div></div>
        <div style="text-align:right"><div style="font-size:13px;font-weight:600;color:#2D6B5E">${esc(a.date)}</div><div style="font-size:11px;color:#aaa">${esc(a.time||'')}</div></div>
      </div>`;})}.join('')}` }
      </div>
    </div>
  </div>`;
}

// ── MODAL ────────────────────────────────────────────────────────────────
function showModal(html){document.getElementById('modal-root').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`;}
function closeModal(){document.getElementById('modal-root').innerHTML='';}

// ── INIT ─────────────────────────────────────────────────────────────────
initAuth();
</script>
</body>
</html>
