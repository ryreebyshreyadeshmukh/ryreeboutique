<script>
// AUTH
const DEFAULT_PW='ryree2024';
function getPw(){return localStorage.getItem('ryree_pw')||DEFAULT_PW;}
function isLoggedIn(){return sessionStorage.getItem('ryree_auth')==='1';}
function initAuth(){if(isLoggedIn())showApp();else showLogin();}
function showLogin(){
  document.getElementById('login-wrap').style.display='flex';
  document.getElementById('app-wrap').style.display='none';
  setTimeout(()=>document.getElementById('login-pw').focus(),100);
}
function showApp(){
  document.getElementById('login-wrap').style.display='none';
  document.getElementById('app-wrap').style.display='flex';
  initDB();
}
function doLogin(){
  const pw=document.getElementById('login-pw').value;
  if(pw===getPw()){
    sessionStorage.setItem('ryree_auth','1');
    document.getElementById('login-err').textContent='';
    document.getElementById('login-pw').classList.remove('error');
    showApp();
  } else {
    document.getElementById('login-pw').classList.add('error');
    document.getElementById('login-err').textContent='Incorrect password.';
    document.getElementById('login-pw').value='';
  }
}
function doLogout(){
  if(!confirm('Sign out?'))return;
  sessionStorage.removeItem('ryree_auth');
  showLogin();
}
function showChangePw(){
  showModal('<div class="modal-title">Change password</div>'+
    '<div class="modal-sub">Set a new password for the app.</div>'+
    '<div class="form-group"><label class="form-label">Current password</label><input class="form-input" id="pw-cur" type="password"></div>'+
    '<div class="form-group"><label class="form-label">New password</label><input class="form-input" id="pw-new" type="password"></div>'+
    '<div class="form-group"><label class="form-label">Confirm new password</label><input class="form-input" id="pw-cf" type="password"></div>'+
    '<div id="pw-err" style="font-size:12px;color:#E24B4A;min-height:18px"></div>'+
    '<div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveNewPw()">Change</button></div>');
}
function saveNewPw(){
  const cur=document.getElementById('pw-cur').value;
  const nw=document.getElementById('pw-new').value.trim();
  const cf=document.getElementById('pw-cf').value.trim();
  const err=document.getElementById('pw-err');
  if(cur!==getPw()){err.textContent='Current password incorrect.';return;}
  if(!nw||nw.length<4){err.textContent='Password must be at least 4 characters.';return;}
  if(nw!==cf){err.textContent='Passwords do not match.';return;}
  localStorage.setItem('ryree_pw',nw);
  closeModal();alert('Password changed!');
}

// FIREBASE DB
let DB={measitems:[],clothing:[],clients:[],orders:[],appointments:[]};
let unsubs=[];

function setSync(status,msg){
  const dot=document.getElementById('sync-dot');
  const txt=document.getElementById('sync-text');
  if(!dot)return;
  dot.style.background=status==='ok'?'#C9A84C':status==='err'?'#E24B4A':'#F59E0B';
  txt.textContent=msg||'';
}

function initDB(){
  setSync('loading','Connecting...');
  const cols=['measitems','clothing','clients','orders','appointments'];
  let loaded=0;
  unsubs.forEach(u=>u());unsubs=[];
  cols.forEach(function(col){
    const unsub=db.collection(col).onSnapshot(function(snap){
      DB[col]=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
      loaded++;
      if(loaded>=cols.length){setSync('ok','Synced ✓');}
      render();
    },function(e){setSync('err','Offline');console.error(e);});
    unsubs.push(unsub);
  });
}

function dbSave(col,item){
  setSync('loading','Saving...');
  db.collection(col).doc(item.id).set(item)
    .then(function(){setSync('ok','Saved ✓');})
    .catch(function(e){setSync('err','Error');console.error(e);});
}

function dbDel(col,id){
  setSync('loading','Deleting...');
  db.collection(col).doc(id).delete()
    .then(function(){setSync('ok','Synced ✓');})
    .catch(function(e){setSync('err','Error');console.error(e);});
}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function initials(n){return (n||'?').split(' ').map(function(w){return w[0];}).slice(0,2).join('').toUpperCase();}
function fmtMoney(v){return '₹'+Number(v||0).toLocaleString('en-IN');}
function statusBadge(s){
  var m={Pending:'b-pending','In Progress':'b-prog',Ready:'b-active',Delivered:'b-done',Cancelled:'b-cancelled'};
  return '<span class="badge '+(m[s]||'b-pending')+'">'+esc(s)+'</span>';
}

// NAV
var page='measitems',selClient=null,selCloth=null;
function nav(p){
  page=p;selClient=null;selCloth=null;
  document.querySelectorAll('.nav-item').forEach(function(e){e.classList.remove('active');});
  var el=document.getElementById('nav-'+p);
  if(el)el.classList.add('active');
  render();
}
function render(){
  var mc=document.getElementById('main-content');
  if(!mc)return;
  var map={measitems:renderMeasItems,clothing:renderClothing,clients:renderClients,
    orders:renderOrders,appointments:renderAppointments,dashboard:renderDashboard};
  mc.innerHTML=(map[page]||renderDashboard)();
}

// MEASUREMENT ITEMS
function renderMeasItems(){
  var rows='';
  DB.measitems.forEach(function(m,i){
    var used=DB.clothing.filter(function(c){return (c.measitemIds||[]).indexOf(m.id)>=0;}).map(function(c){return c.name;});
    rows+='<tr><td><span class="pill">'+(i+1)+'</span></td>'+
      '<td><strong>'+esc(m.name)+'</strong></td>'+
      '<td style="color:#888">'+(esc(m.unit)||'—')+'</td>'+
      '<td>'+(used.length?used.map(function(n){return '<span class="pill">'+esc(n)+'</span>';}).join(''):'<span style="color:#ccc;font-size:12px">Not linked</span>')+'</td>'+
      '<td><div style="display:flex;gap:6px">'+
        '<button class="btn btn-xs" onclick="editMeasItem('\''+m.id+'\'')">Edit</button>'+
        '<button class="btn-danger" onclick="delMeasItem('\''+m.id+'\'')">Delete</button>'+
      '</div></td></tr>';
  });
  return '<div class="page-header">'+
    '<div><div class="page-title">Measurement Items</div><div class="page-sub">Global list — link to clothing types</div></div>'+
    '<button class="btn btn-primary" onclick="addMeasItem()">+ Add Item</button></div>'+
    '<div class="card-p0">'+
    (DB.measitems.length===0?'<div class="empty">No items yet.<br>Add fields like "Bust", "Waist", "Sleeve Length" etc.</div>':
    '<table><thead><tr><th>#</th><th>Name</th><th>Unit</th><th>Used in</th><th>Actions</th></tr></thead><tbody>'+rows+'</tbody></table>')+
    '</div>';
}
function addMeasItem(){
  showModal('<div class="modal-title">Add measurement item</div>'+
    '<div class="form-row">'+

function delMeasItem(id){

  dbDel('measitems',id);

// TAKE MEASUREMENTS
var _measClientId=null,_measActiveCloth=null;
function openTakeMeas(clientId,prefillCid){
  if(!DB.clothing.length){alert('Add clothing items first.');return;}
  var hasLinked=DB.clothing.some(function(c){return (c.measitemIds||[]).length>0;});
  if(!hasLinked){alert('Link measurement items to clothing items first.');return;}
  _measClientId=clientId;
  _measActiveCloth=prefillCid||DB.clothing.filter(function(c){return (c.measitemIds||[]).length>0;})[0].id;
  renderTakeMeasModal();
}
function renderTakeMeasModal(){
  var cl=DB.clients.find(function(x){return x.id===_measClientId;});
  var tabs=DB.clothing.map(function(c){
    var has=(c.measitemIds||[]).length>0;
    var done=cl.measurements&&cl.measurements[c.id]&&Object.keys(cl.measurements[c.id]).length>0;
    return '<button class="cloth-tab'+(c.id===_measActiveCloth?' active':'')+'" onclick="_measActiveCloth='\''+c.id+'\'';renderTakeMeasModal()">'+
      esc(c.name)+(done&&c.id!==_measActiveCloth?' ✓':'')+(has?'':' *')+'</button>';
  }).join('');
  var activeCloth=DB.clothing.find(function(x){return x.id===_measActiveCloth;});
  var linked=(activeCloth.measitemIds||[]).map(function(id){return DB.measitems.find(function(x){return x.id===id;});}).filter(Boolean);
  var existing=cl.measurements&&cl.measurements[_measActiveCloth]?cl.measurements[_measActiveCloth]:{};
  var fields=linked.length===0?
    '<div class="warn-box">No fields linked to "'+esc(activeCloth.name)+'". Go to Clothing Items → Manage measurements.</div>':
    '<div class="meas-grid">'+linked.map(function(m){
      return '<div class="form-group" style="margin-bottom:0"><label class="form-label">'+esc(m.name)+(m.unit?' ('+esc(m.unit)+')':'')+'</label>'+
        '<input class="form-input mf" data-name="'+esc(m.name)+'" value="'+esc(existing[m.name]||'')+'" placeholder="—"></div>';
    }).join('')+'</div>';
  showModal('<div class="modal-title">Take Measurements — '+esc(cl.name)+'</div>'+
    '<div class="modal-sub">Select a clothing tab, fill values, save. ✓ = already recorded.</div>'+
    '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px">'+tabs+'</div>'+
    '<div id="meas-fields-body">'+fields+'</div>'+
    '<div class="modal-actions"><button class="btn" onclick="closeModal()">Close</button>'+
    '<button class="btn btn-primary" onclick="saveTakeMeas()">Save & next →</button></div>');
}
function saveTakeMeas(){
  var cl=DB.clients.find(function(x){return x.id===_measClientId;});
  var vals={};
  document.querySelectorAll('.mf').forEach(function(el){if(el.value.trim())vals[el.dataset.name]=el.value.trim();});
  var meas=Object.assign({},cl.measurements||{});
  meas[_measActiveCloth]=vals;
  var updated=Object.assign({},cl,{measurements:meas});
  dbSave('clients',updated);
  var clothIds=DB.clothing.map(function(c){return c.id;});
  var next=clothIds[clothIds.indexOf(_measActiveCloth)+1];
  if(next){_measActiveCloth=next;renderTakeMeasModal();}
  else closeModal();
}

    '<div><div style="font-size:10px;color:#aaa;font-weight:700;letter-spacing:.08em;margin-bottom:4px">RYREE BY SHREYA DESHMUKH</div>'+
    '<div style="font-size:22px;font-weight:800;color:#1a1a1a">'+cl.name+'</div>'+
    '<div style="font-size:13px;color:#666;margin-top:5px">'+(cl.phone||'')+(cl.email?' · '+cl.email:'')+'</div></div>'+
    '<div style="text-align:right;background:#e6f0ee;padding:10px 14px;border-radius:8px">'+
    '<div style="font-size:10px;color:#aaa;font-weight:700;margin-bottom:2px">DATE</div>'+
    '<div style="font-size:13px;font-weight:700;color:#2D6B5E">'+today+'</div></div></div>'+
    (measKeys.length===0?'<p style="color:#aaa">No measurements recorded.</p>':sections)+
    (cl.notes?'<div style="margin-top:18px;background:#f9f9f9;border-left:4px solid #C9A84C;padding:10px 14px;font-size:13px;color:#555;border-radius:0 6px 6px 0"><strong>Notes:</strong> '+cl.notes+'</div>':'')+
    orderSection+
    '<div style="margin-top:20px;text-align:center;font-size:11px;color:#ccc;padding-top:14px;border-top:1px solid #f0f0f0">Ryree by Shreya Deshmukh · '+today+'</div></div></body></html>';
  var win=window.open('','_blank');
  if(win){win.document.write(html);win.document.close();setTimeout(function(){win.print();},500);}
  else alert('Please allow popups to print.');
}

// ORDERS
function renderOrders(){
  var statuses=['Pending','In Progress','Ready','Delivered','Cancelled'];
  var rows=DB.orders.slice().reverse().map(function(o){
    var cl=DB.clients.find(function(x){return x.id===o.clientId;});
    var opts=statuses.map(function(s){return '<option'+(o.status===s?' selected':'')+'>'+s+'</option>';}).join('');
    return '<tr>'+
      '<td><div style="display:flex;align-items:center;gap:9px"><div class="avatar" style="width:28px;height:28px;font-size:10px">'+initials(cl?cl.name:'?')+'</div><span style="font-weight:500">'+esc(cl?cl.name:'?')+'</span></div></td>'+
      '<td>'+esc(o.item)+'</td>'+
      '<td style="font-weight:600">'+fmtMoney(o.amount)+'</td>'+
      '<td style="color:#888">'+(o.advance?fmtMoney(o.advance):'—')+'</td>'+
      '<td style="color:#888">'+esc(o.delivery||'—')+'</td>'+
      '<td><select style="border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:600;outline:none;color:#555" onchange="updateOrderStatus('\''+o.id+'\'',this.value)">'+opts+'</select></td>'+
      '<td><div style="display:flex;gap:5px"><button class="btn btn-xs" onclick="editOrder('\''+o.id+'\'')">Edit</button><button class="btn-danger" onclick="delOrder('\''+o.id+'\'')">Del</button></div></td>'+
      '</tr>';
  }).join('');
  return '<div class="page-header"><div><div class="page-title">Orders</div><div class="page-sub">'+DB.orders.length+' total</div></div>'+
    '<button class="btn btn-primary" onclick="addOrder()">+ New Order</button></div>'+
    '<div class="card-p0">'+
    (DB.orders.length===0?'<div class="empty">No orders yet.</div>':
    '<table><thead><tr><th>Client</th><th>Item</th><th>Amount</th><th>Advance</th><th>Delivery</th><th>Status</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>')+
    '</div>';
}
function addOrder(){
  var co=DB.clients.map(function(c){return '<option value="'+c.id+'">'+esc(c.name)+'</option>';}).join('');
  var io=DB.clothing.map(function(c){return '<option value="'+esc(c.name)+'">'+esc(c.name)+'</option>';}).join('');
  showModal('<div class="modal-title">New order</div>'+
    '<div class="form-group"><label class="form-label">Client *</label><select class="form-input" id="m-client"><option value="">Select...</option>'+co+'</select></div>'+
    '<div class="form-group"><label class="form-label">Clothing item *</label><select class="form-input" id="m-item"><option value="">Select...</option>'+io+'</select></div>'+
    '<div class="form-row">'+
    '<div class="form-group"><label class="form-label">Total amount (₹)</label><input class="form-input" id="m-amount" type="number" placeholder="0"></div>'+
    '<div class="form-group"><label class="form-label">Advance paid (₹)</label><input class="form-input" id="m-advance" type="number" placeholder="0"></div>'+
    '</div><div class="form-group"><label class="form-label">Delivery date</label><input class="form-input" id="m-delivery" type="date"></div>'+
    '<div class="form-group"><label class="form-label">Notes</label><textarea class="form-input" id="m-notes" rows="2"></textarea></div>'+
    '<div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveOrder()">Add</button></div>');
}
function editOrder(id){
  var o=DB.orders.find(function(x){return x.id===id;});
  var co=DB.clients.map(function(c){return '<option value="'+c.id+'"'+(c.id===o.clientId?' selected':'')+'>'+esc(c.name)+'</option>';}).join('');
  var io=DB.clothing.map(function(c){return '<option value="'+esc(c.name)+'"'+(c.name===o.item?' selected':'')+'>'+esc(c.name)+'</option>';}).join('');
  showModal('<div class="modal-title">Edit order</div>'+
    '<div class="form-group"><label class="form-label">Client</label><select class="form-input" id="m-client">'+co+'</select></div>'+
    '<div class="form-group"><label class="form-label">Item</label><select class="form-input" id="m-item">'+io+'</select></div>'+
    '<div class="form-row">'+
    '<div class="form-group"><label class="form-label">Total (₹)</label><input class="form-input" id="m-amount" type="number" value="'+(o.amount||0)+'"></div>'+
    '<div class="form-group"><label class="form-label">Advance (₹)</label><input class="form-input" id="m-advance" type="number" value="'+(o.advance||0)+'"></div>'+
    '</div><div class="form-group"><label class="form-label">Delivery date</label><input class="form-input" id="m-delivery" type="date" value="'+esc(o.delivery||'')+'"></div>'+
    '<div class="form-group"><label class="form-label">Notes</label><textarea class="form-input" id="m-notes" rows="2">'+esc(o.notes||'')+'</textarea></div>'+
    '<div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveOrder('\''+id+'\'')">Save</button></div>');
}
function saveOrder(id){
  var clientId=document.getElementById('m-client').value;
  var item=document.getElementById('m-item').value;
  if(!clientId||!item)return;
  var existing=id?DB.orders.find(function(x){return x.id===id;}):null;
  dbSave('orders',{id:id||uid(),clientId:clientId,item:item,
    amount:document.getElementById('m-amount').value,
    advance:document.getElementById('m-advance').value,
    delivery:document.getElementById('m-delivery').value,
    notes:document.getElementById('m-notes').value,
    status:existing?existing.status:'Pending',
    created:existing?existing.created:Date.now()
  });
  closeModal();
}
function updateOrderStatus(id,s){
  var o=DB.orders.find(function(x){return x.id===id;});
  if(o)dbSave('orders',Object.assign({},o,{status:s}));
}
function delOrder(id){if(!confirm('Delete this order?'))return;dbDel('orders',id);}

// APPOINTMENTS
function renderAppointments(){
  var today=new Date().toISOString().split('T')[0];
  var up=DB.appointments.filter(function(a){return a.date>=today;}).sort(function(a,b){return a.date.localeCompare(b.date);});
  var past=DB.appointments.filter(function(a){return a.date<today;}).sort(function(a,b){return b.date.localeCompare(a.date);});
  function tbl(list,dim){
    var rows=list.map(function(a){
      var cl=DB.clients.find(function(x){return x.id===a.clientId;});
      return '<tr style="'+(dim?'opacity:.55;':'')+'">'+
        '<td><div style="display:flex;align-items:center;gap:9px"><div class="avatar" style="width:28px;height:28px;font-size:10px">'+initials(cl?cl.name:'?')+'</div>'+esc(cl?cl.name:'?')+'</div></td>'+
        '<td style="font-weight:500">'+esc(a.date)+'</td><td style="color:#888">'+esc(a.time||'—')+'</td><td>'+esc(a.purpose||'—')+'</td>'+
        '<td><button class="btn-danger" onclick="delAppt('\''+a.id+'\'')">Delete</button></td></tr>';
    }).join('');
    return '<table><thead><tr><th>Client</th><th>Date</th><th>Time</th><th>Purpose</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>';
  }
  return '<div class="page-header"><div><div class="page-title">Appointments</div><div class="page-sub">'+up.length+' upcoming</div></div>'+
    '<button class="btn btn-primary" onclick="addAppt()">+ Schedule</button></div>'+
    '<div class="section-title">Upcoming</div>'+
    '<div class="card-p0" style="margin-bottom:20px">'+(up.length===0?'<div class="empty">No upcoming appointments.</div>':tbl(up,false))+'</div>'+
    '<div class="section-title" style="color:#aaa">Past</div>'+
    '<div class="card-p0">'+(past.length===0?'<div class="empty">No past appointments.</div>':tbl(past.slice(0,20),true))+'</div>';
}
function addAppt(){
  var co=DB.clients.map(function(c){return '<option value="'+c.id+'">'+esc(c.name)+'</option>';}).join('');
  showModal('<div class="modal-title">Schedule appointment</div>'+
    '<div class="form-group"><label class="form-label">Client *</label><select class="form-input" id="m-client"><option value="">Select...</option>'+co+'</select></div>'+
    '<div class="form-row">'+
    '<div class="form-group"><label class="form-label">Date *</label><input class="form-input" id="m-date" type="date" value="'+new Date().toISOString().split('T')[0]+'"></div>'+
    '<div class="form-group"><label class="form-label">Time</label><input class="form-input" id="m-time" type="time"></div>'+
    '</div><div class="form-group"><label class="form-label">Purpose</label><input class="form-input" id="m-purpose" placeholder="e.g. First fitting, Trial, Delivery"></div>'+
    '<div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveAppt()">Schedule</button></div>');
}
function saveAppt(){
  var cid=document.getElementById('m-client').value;
  var date=document.getElementById('m-date').value;
  if(!cid||!date)return;
  dbSave('appointments',{id:uid(),clientId:cid,date:date,
    time:document.getElementById('m-time').value,
    purpose:document.getElementById('m-purpose').value
  });
  closeModal();
}
function delAppt(id){dbDel('appointments',id);}

// DASHBOARD
function renderDashboard(){
  var today=new Date().toISOString().split('T')[0];
  var active=DB.orders.filter(function(o){return ['Pending','In Progress','Ready'].indexOf(o.status)>=0;}).length;
  var rev=DB.orders.filter(function(o){return o.status==='Delivered';}).reduce(function(a,o){return a+Number(o.amount||0);},0);
  var todayA=DB.appointments.filter(function(a){return a.date===today;}).length;
  var recentO=DB.orders.slice().reverse().slice(0,6);
  var upA=DB.appointments.filter(function(a){return a.date>=today;}).sort(function(a,b){return a.date.localeCompare(b.date);}).slice(0,6);
  var oRows=recentO.map(function(o){
    var cl=DB.clients.find(function(x){return x.id===o.clientId;});
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid #f5f5f5">'+
      '<div><div style="font-size:13px;font-weight:600">'+esc(cl?cl.name:'?')+'</div><div style="font-size:11px;color:#aaa">'+esc(o.item)+' · '+fmtMoney(o.amount)+'</div></div>'+
      statusBadge(o.status)+'</div>';
  }).join('');
  var aRows=upA.map(function(a){
    var cl=DB.clients.find(function(x){return x.id===a.clientId;});
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid #f5f5f5">'+
      '<div><div style="font-size:13px;font-weight:600">'+esc(cl?cl.name:'?')+'</div><div style="font-size:11px;color:#aaa">'+esc(a.purpose||'Appointment')+'</div></div>'+
      '<div style="text-align:right"><div style="font-size:13px;font-weight:600;color:#2D6B5E">'+esc(a.date)+'</div><div style="font-size:11px;color:#aaa">'+esc(a.time||'')+'</div></div></div>';
  }).join('');
  return '<div class="page-header"><div class="page-title">Dashboard</div></div>'+
    '<div class="stats-row">'+
    '<div class="stat-card"><div class="stat-label">Total clients</div><div class="stat-val">'+DB.clients.length+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">Active orders</div><div class="stat-val" style="color:#2D6B5E">'+active+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">Today's appointments</div><div class="stat-val" style="color:#2D6B5E">'+todayA+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">Revenue collected</div><div class="stat-val" style="color:#C9A84C">'+fmtMoney(rev)+'</div></div>'+
    '</div>'+
    '<div class="two-col">'+
    '<div><div class="section-title">Recent orders</div><div class="card-p0">'+(recentO.length===0?'<div class="empty" style="padding:24px">No orders yet.</div>':oRows)+'</div></div>'+
    '<div><div class="section-title">Upcoming appointments</div><div class="card-p0">'+(upA.length===0?'<div class="empty" style="padding:24px">No upcoming appointments.</div>':aRows)+'</div></div>'+
    '</div>';
}

// MODAL
function showModal(html){
  document.getElementById('modal-root').innerHTML='<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">'+html+'</div></div>';
}
function closeModal(){document.getElementById('modal-root').innerHTML='';}

initAuth();
</script>
